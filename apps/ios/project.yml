name: Carlito
options:
  bundleIdPrefix: ai.carlito
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  CarlitoKit:
    path: ../shared/CarlitoKit
  Swabble:
    path: ../../Swabble

schemes:
  Carlito:
    shared: true
    build:
      targets:
        Carlito: all
    test:
      targets:
        - CarlitoTests
        - CarlitoLogicTests
  CarlitoLogicTests:
    shared: true
    build:
      targets:
        CarlitoLogicTests: all
    test:
      targets:
        - CarlitoLogicTests

targets:
  Carlito:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: CarlitoShareExtension
        embed: true
      - target: CarlitoActivityWidget
        embed: true
      - target: CarlitoWatchApp
      - package: CarlitoKit
      - package: CarlitoKit
        product: CarlitoChatUI
      - package: CarlitoKit
        product: CarlitoProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Carlito.entitlements
        CODE_SIGN_STYLE: "$(CARLITO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CARLITO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(CARLITO_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(CARLITO_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          CARLITO_PUSH_TRANSPORT: direct
          CARLITO_PUSH_DISTRIBUTION: local
          CARLITO_PUSH_RELAY_BASE_URL: ""
          CARLITO_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          CARLITO_PUSH_TRANSPORT: direct
          CARLITO_PUSH_DISTRIBUTION: local
          CARLITO_PUSH_RELAY_BASE_URL: ""
          CARLITO_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Carlito
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.carlito.ios
            CFBundleURLSchemes:
              - carlito
        CFBundleShortVersionString: "$(CARLITO_MARKETING_VERSION)"
        CarlitoCanonicalVersion: "$(CARLITO_IOS_VERSION)"
        CFBundleVersion: "$(CARLITO_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.carlito.ios.bgrefresh
        NSLocalNetworkUsageDescription: Carlito discovers and connects to your Carlito gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _carlito-gw._tcp
        NSCameraUsageDescription: Carlito can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Carlito uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Carlito can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Carlito needs microphone access for voice wake.
        NSMotionUsageDescription: Carlito may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Carlito needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Carlito uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        CarlitoPushTransport: "$(CARLITO_PUSH_TRANSPORT)"
        CarlitoPushDistribution: "$(CARLITO_PUSH_DISTRIBUTION)"
        CarlitoPushRelayBaseURL: "$(CARLITO_PUSH_RELAY_BASE_URL)"
        CarlitoPushAPNsEnvironment: "$(CARLITO_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  CarlitoShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: CarlitoKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(CARLITO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CARLITO_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(CARLITO_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(CARLITO_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Carlito Share
        CFBundleShortVersionString: "$(CARLITO_MARKETING_VERSION)"
        CFBundleVersion: "$(CARLITO_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  CarlitoActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/CarlitoActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(CARLITO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CARLITO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(CARLITO_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Carlito Activity
        CFBundleShortVersionString: "$(CARLITO_MARKETING_VERSION)"
        CFBundleVersion: "$(CARLITO_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  CarlitoWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: CarlitoWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(CARLITO_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(CARLITO_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(CARLITO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CARLITO_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(CARLITO_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(CARLITO_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Carlito
        CFBundleShortVersionString: "$(CARLITO_MARKETING_VERSION)"
        CFBundleVersion: "$(CARLITO_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(CARLITO_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  CarlitoWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(CARLITO_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(CARLITO_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(CARLITO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CARLITO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(CARLITO_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(CARLITO_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Carlito
        CFBundleShortVersionString: "$(CARLITO_MARKETING_VERSION)"
        CFBundleVersion: "$(CARLITO_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(CARLITO_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  CarlitoTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Carlito
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(CARLITO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CARLITO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.carlito.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Carlito.app/Carlito"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: CarlitoTests
        CFBundleShortVersionString: "$(CARLITO_MARKETING_VERSION)"
        CFBundleVersion: "$(CARLITO_BUILD_VERSION)"

  CarlitoLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: CarlitoKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(CARLITO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CARLITO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.carlito.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: CarlitoLogicTests
        CFBundleShortVersionString: "$(CARLITO_MARKETING_VERSION)"
        CFBundleVersion: "$(CARLITO_BUILD_VERSION)"
