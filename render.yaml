services:
  - type: web
    name: carlito
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: CARLITO_GATEWAY_PORT
        value: "8080"
      - key: CARLITO_STATE_DIR
        value: /data/.carlito
      - key: CARLITO_WORKSPACE_DIR
        value: /data/workspace
      - key: CARLITO_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: carlito-data
      mountPath: /data
      sizeGB: 1
